<svg width="900" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="300" fill="#111111"/>

  <!-- 入力 -->
  <rect x="40" y="60" width="200" height="180" fill="none" stroke="white" rx="6"/>
  <text x="140" y="90" fill="white" text-anchor="middle">入力</text>
  <text x="140" y="125" fill="white" text-anchor="middle">Execution Logs</text>
  <text x="140" y="150" fill="white" text-anchor="middle">Reasoning Traces</text>
  <text x="140" y="175" fill="white" text-anchor="middle">Validation Results</text>

  <!-- 中央 -->
  <rect x="350" y="60" width="200" height="180" fill="none" stroke="white" rx="6"/>
  <text x="450" y="90" fill="white" text-anchor="middle">中央処理</text>
  <text x="450" y="125" fill="white" text-anchor="middle">Context Structuring</text>
  <text x="450" y="150" fill="white" text-anchor="middle">Institutionalization</text>
  <text x="450" y="175" fill="white" text-anchor="middle">Reuse Tags</text>

  <!-- 出力 -->
  <rect x="660" y="60" width="200" height="180" fill="none" stroke="white" rx="6"/>
  <text x="760" y="90" fill="white" text-anchor="middle">出力</text>
  <text x="760" y="125" fill="white" text-anchor="middle">Future Research</text>
  <text x="760" y="150" fill="white" text-anchor="middle">Governance Decisions</text>
  <text x="760" y="175" fill="white" text-anchor="middle">Civilization Layer</text>

  <!-- 矢印 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="white"/>
    </marker>
  </defs>

  <line x1="240" y1="150" x2="350" y2="150" stroke="white" marker-end="url(#arrow)"/>
  <line x1="550" y1="150" x2="660" y2="150" stroke="white" marker-end="url(#arrow)"/>
  <line x1="660" y1="210" x2="350" y2="210" stroke="white" marker-end="url(#arrow)"/>
</svg>
