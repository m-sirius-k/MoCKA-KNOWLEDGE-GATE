<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" width="900" height="420">

<rect width="100%" height="100%" fill="#0d1117"/>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<polygon points="0 0, 10 3, 0 6" fill="#ffffff"/>
</marker>
</defs>

<!-- nodes -->

<rect x="70" y="170" width="200" height="50" fill="#0d1117" stroke="#58a6ff" stroke-width="3"/>
<text font-family="Segoe UI, Arial" text-anchor="middle" dominant-baseline="middle" x="170" y="200" fill="#0D1117" font-size="14" text-anchor="middle">Research Activity</text>

<rect x="350" y="90" width="200" height="50" fill="#0d1117" stroke="#f0883e" stroke-width="3"/>
<text font-family="Segoe UI, Arial" text-anchor="middle" dominant-baseline="middle" x="450" y="120" fill="#0D1117" font-size="14" text-anchor="middle">Documentation</text>

<rect x="350" y="260" width="200" height="50" fill="#0d1117" stroke="#a371f7" stroke-width="3"/>
<text font-family="Segoe UI, Arial" text-anchor="middle" dominant-baseline="middle" x="450" y="290" fill="#0D1117" font-size="14" text-anchor="middle">Analysis</text>

<rect x="650" y="170" width="200" height="50" fill="#0d1117" stroke="#3fb950" stroke-width="3"/>
<text font-family="Segoe UI, Arial" text-anchor="middle" dominant-baseline="middle" x="750" y="200" fill="#0D1117" font-size="14" text-anchor="middle">Institutional Memory</text>

<!-- arrows -->

<line x1="270" y1="195" x2="350" y2="115" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="270" y1="195" x2="350" y2="285" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)"/>

<line x1="550" y1="115" x2="650" y2="195" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="550" y1="285" x2="650" y2="195" stroke="#ffffff" stroke-width="3" marker-end="url(#arrow)"/>

<!-- feedback -->

<path d="M750 220 C750 300 200 300 170 220"
stroke="#58a6ff" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

</svg>





