<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">

<style>
.box { fill:#0b1220; stroke:#6aa0ff; stroke-width:2; rx:10; }
.text { fill:white; font-family:Segoe UI, Arial; font-size:16px; text-anchor:middle; }
.sub { fill:#9bbcff; font-size:13px; }
.line { stroke:#7f9cff; stroke-width:2; }
</style>

<!-- MoCKA Core -->
<rect class="box" x="350" y="40" width="200" height="60"/>
<text class="text" x="450" y="65">MoCKA Core</text>
<text class="text sub" x="450" y="85">Research Execution</text>

<!-- Knowledge Gate -->
<rect class="box" x="120" y="200" width="200" height="70"/>
<text class="text" x="220" y="225">Knowledge Gate</text>
<text class="text sub" x="220" y="245">Institutional Memory</text>

<!-- Transparency -->
<rect class="box" x="350" y="200" width="200" height="70"/>
<text class="text" x="450" y="225">Transparency</text>
<text class="text sub" x="450" y="245">Audit Layer</text>

<!-- External Brain -->
<rect class="box" x="580" y="200" width="200" height="70"/>
<text class="text" x="680" y="225">External Brain</text>
<text class="text sub" x="680" y="245">Knowledge Integration</text>

<!-- Civilization -->
<rect class="box" x="350" y="380" width="200" height="70"/>
<text class="text" x="450" y="405">Civilization</text>
<text class="text sub" x="450" y="425">Governance Philosophy</text>

<!-- Lines -->
<line class="line" x1="450" y1="100" x2="220" y2="200"/>
<line class="line" x1="450" y1="100" x2="450" y2="200"/>
<line class="line" x1="450" y1="100" x2="680" y2="200"/>

<line class="line" x1="220" y1="270" x2="450" y2="380"/>
<line class="line" x1="450" y1="270" x2="450" y2="380"/>
<line class="line" x1="680" y1="270" x2="450" y2="380"/>

</svg>
