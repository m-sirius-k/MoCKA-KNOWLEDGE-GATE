name: Miro Import from GitHub

on:
  push:
      paths:
            - 'miro_import/**'
              workflow_dispatch:

              jobs:
                import:
                    runs-on: ubuntu-latest
                        timeout-minutes: 30
                            steps:
                                  - name: Checkout repository
                                          uses: actions/checkout@v4

                                                - name: Set up Node.js
                                                        uses: actions/setup-node@v4
                                                                with:
                                                                          node-version: '18'
                                                                                    cache: 'npm'

                                                                                          - name: Install dependencies
                                                                                                  run: npm install

                                                                                                        - name: Run Miro import
                                                                                                                env:
                                                                                                                          MIRO_CLIENT_ID: ${{ secrets.MIRO_CLIENT_ID }}
                                                                                                                                    MIRO_CLIENT_SECRET: ${{ secrets.MIRO_CLIENT_SECRET }}
                                                                                                                                              MIRO_BOARD_ID: ${{ secrets.MIRO_BOARD_ID }}
                                                                                                                                                      run: node scripts/miro-import.js
                                                                                                                                                      
                                                                                                                                                            - name: Upload artifacts
                                                                                                                                                                    if: always()
                                                                                                                                                                            uses: actions/upload-artifact@v4
                                                                                                                                                                                    with:
                                                                                                                                                                                              name: miro-import-logs
                                                                                                                                                                                                        path: logs/
                                                                                                                                                                                                                  retention-days: 7
